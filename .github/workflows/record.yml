name: Meet Recorder Pro (Lite)

on:
  workflow_dispatch:
    inputs:
      meet_url:
        description: 'Meeting URL'
        required: true
        type: string
      render_url:
        description: 'Render App External URL'
        required: false
        type: string

jobs:
  record:
    name: 🎥 Ghost Lite Session
    runs-on: ubuntu-latest
    # Match the required Playwright version to avoid executable mismatch
    container:
      image: mcr.microsoft.com/playwright:v1.48.0-jammy
      options: --user root

    permissions:
      contents: read
      actions: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Install Lite Dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xvfb ffmpeg pulseaudio x11vnc novnc python3-websockify xdotool jq curl python3-pip
          # Sync pip packages with container version
          pip3 install requests playwright-stealth==1.0.6 playwright==1.48.0

      - name: 🚀 Start Optimized Runner
        env:
          MEET_URL: ${{ github.event.inputs.meet_url }}
          RENDER_URL: ${{ github.event.inputs.render_url }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
          HOME: /root
        run: |
          # 1. Setup Audio (Improved for Docker Root)
          mkdir -p /root/.config/pulse
          echo "default-server = unix:/run/user/0/pulse/native" > /root/.config/pulse/client.conf
          pulseaudio -D --exit-idle-time=-1 --realtime=false --disallow-exit --disallow-module-loading --fail=no || true
          
          # Load null sink for recording
          pactl load-module module-null-sink sink_name=Virtual_Sink || true
          pactl set-default-sink Virtual_Sink || true
          pactl set-default-source Virtual_Sink.monitor || true
          
          # 2. Virtual Screen
          Xvfb :99 -screen 0 1280x720x16 &
          export DISPLAY=:99
          sleep 2
          
          # 3. VNC Server (Fixed unrecognized options)
          VNC_PASS=$(openssl rand -hex 4)
          export VNC_PASS
          x11vnc -display :99 -forever -shared -bg -passwd "$VNC_PASS" -rfbport 5900 -listen 0.0.0.0 -noxdamage -ncache 10 &
          sleep 1
          
          # 4. Bridge to noVNC
          websockify --web /usr/share/novnc 6080 0.0.0.0:5900 &
          sleep 1
          
          # 5. Launch Tunnel & Ghost Bot
          python3 tunnel.py &
          python3 meet_bot.py

      - name: 📤 Upload & Full Privacy Cleanup
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          cat << 'EOF' > upload.py
          import os, requests, subprocess
          token = os.environ.get('BOT_TOKEN')
          chat = os.environ.get('CHAT_ID')
          if os.path.exists('output.mp4'):
              size = os.path.getsize('output.mp4') / (1024*1024)
              requests.post(f'https://api.telegram.org/bot{token}/sendMessage', data={'chat_id': chat, 'text': f'📹 **Session Complete!** ({size:.1f} MB)\nUploading now...'})
              if size < 49:
                  with open('output.mp4', 'rb') as f:
                      requests.post(f'https://api.telegram.org/bot{token}/sendDocument', data={'chat_id': chat}, files={'document': f})
              else:
                  subprocess.run(["ffmpeg", "-i", "output.mp4", "-c", "copy", "-f", "segment", "-segment_time", "1200", "part_%03d.mp4"])
                  for p in sorted([f for f in os.listdir('.') if f.startswith('part_')]):
                      with open(p, 'rb') as f: requests.post(f'https://api.telegram.org/bot{token}/sendDocument', data={'chat_id': chat}, files={'document': f})
          EOF
          python3 upload.py
          
          echo "🧹 Wiping session logs..."
          # Use Bearer token for better compatibility
          curl -X DELETE -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID" || true
