name: Meet Recorder Pro (Lite)

on:
  workflow_dispatch:
    inputs:
      meet_url:
        description: 'Meeting URL'
        required: true
        type: string
      render_url:
        description: 'Render App External URL'
        required: false
        type: string

jobs:
  record:
    name: 🎥 Ghost Lite Session
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.48.0-jammy
      options: --user root

    permissions:
      contents: read
      actions: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Install Lite Dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xvfb ffmpeg pulseaudio x11vnc novnc python3-websockify xdotool jq curl python3-pip
          pip3 install requests playwright-stealth==1.0.6 playwright==1.48.0

      - name: 🚀 Start Optimized Runner
        env:
          MEET_URL: ${{ github.event.inputs.meet_url }}
          RENDER_URL: ${{ github.event.inputs.render_url }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
          HOME: /root
        run: |
          # 1. Setup Audio (System Mode for Root in Container)
          mkdir -p /var/run/pulse /root/.config/pulse
          pulseaudio -D --system --disallow-exit --disallow-module-loading --fail=no || true
          
          # Wait for PulseAudio and create Virtual Sink
          sleep 5
          pactl load-module module-null-sink sink_name=Virtual_Sink || true
          pactl set-default-sink Virtual_Sink || true
          pactl set-default-source Virtual_Sink.monitor || true
          
          # 2. Virtual Screen (Optimized 720p)
          Xvfb :99 -screen 0 1280x720x16 &
          export DISPLAY=:99
          sleep 2
          
          # 3. VNC Server (High-Performance settings)
          VNC_PASS=$(openssl rand -hex 4)
          export VNC_PASS
          x11vnc -display :99 -forever -shared -bg -passwd "$VNC_PASS" -rfbport 5900 -listen 0.0.0.0 -noxdamage -ncache 10 &
          sleep 2
          
          # 4. Bridge to noVNC
          websockify --web /usr/share/novnc 6080 0.0.0.0:5900 &
          sleep 2
          
          # 5. Launch Tunnel & Ghost Bot
          python3 tunnel.py &
          python3 meet_bot.py

      - name: 📤 Upload & Full Privacy Cleanup
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          # 1. Smart Upload logic for Telegram
          cat << 'EOF' > upload.py
          import os, requests, subprocess, time
          token = os.environ.get('BOT_TOKEN')
          chat = os.environ.get('CHAT_ID')
          if os.path.exists('output.mp4'):
              size = os.path.getsize('output.mp4') / (1024*1024)
              requests.post(f'https://api.telegram.org/bot{token}/sendMessage', data={'chat_id': chat, 'text': f'📹 **Session Complete!** ({size:.1f} MB)\n📤 **Starting upload to Telegram...**', 'parse_mode': 'Markdown'})
              
              if size < 49:
                  with open('output.mp4', 'rb') as f:
                      requests.post(f'https://api.telegram.org/bot{token}/sendDocument', data={'chat_id': chat, 'caption': '🎬 **Meeting Recording**'}, files={'document': f})
              else:
                  requests.post(f'https://api.telegram.org/bot{token}/sendMessage', data={'chat_id': chat, 'text': '📂 *File is large, splitting into parts...*', 'parse_mode': 'Markdown'})
                  subprocess.run(["ffmpeg", "-i", "output.mp4", "-c", "copy", "-f", "segment", "-segment_time", "1200", "-reset_timestamps", "1", "part_%03d.mp4"])
                  chunks = sorted([f for f in os.listdir('.') if f.startswith('part_')])
                  for i, chunk in enumerate(chunks):
                      with open(chunk, 'rb') as f:
                          requests.post(f'https://api.telegram.org/bot{token}/sendDocument', data={'chat_id': chat, 'caption': f'🎬 **Part {i+1} of {len(chunks)}**'}, files={'document': f})
                      os.remove(chunk)
              
              requests.post(f'https://api.telegram.org/bot{token}/sendMessage', data={'chat_id': chat, 'text': '✨ **Upload Successful!** Cleaning up system logs...', 'parse_mode': 'Markdown'})
          else:
              requests.post(f'https://api.telegram.org/bot{token}/sendMessage', data={'chat_id': chat, 'text': '🏁 **Runner Session Closed.** No recording file was generated.'})
          EOF
          python3 upload.py
          
          # 2. Ghost Mode: Delete current and all previous runs to keep Actions history empty
          echo "🧹 Wiping session logs from GitHub..."
          # Delete current run
          curl -X DELETE -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID" || true
          
          # Delete all previous runs of this workflow to keep it 100% clean
          workflow_id=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/actions/workflows/record.yml" | jq -r '.id')
          
          if [ "$workflow_id" != "null" ]; then
            curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/actions/workflows/$workflow_id/runs" | \
              jq -r '.workflow_runs[].id' | xargs -I {} \
              curl -X DELETE -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/actions/runs/{}" || true
          fi
          echo "✨ GHOST MODE: All history wiped."
