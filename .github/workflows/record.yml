name: Meet Recorder

on:
  workflow_dispatch:
    inputs:
      meet_url:
        description: 'Meeting URL'
        required: true
        type: string
      render_url:
        description: 'Render App External URL'
        required: false
        type: string

jobs:
  record:
    name: 🎥 Meeting Session
    runs-on: ubuntu-latest
    timeout-minutes: 350
    
    permissions:
      contents: read
      actions: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🛠️ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg pulseaudio jq scrot xdotool libgbm-dev libxshmfence1 libnss3 x11vnc novnc python3-websockify
          sudo apt-get install -y libasound2t64 || sudo apt-get install -y libasound2 || true
          pip install --upgrade pip
          pip install playwright requests playwright-stealth==1.0.6
          playwright install chromium
          playwright install-deps

      - name: 🎥 Start Runner
        env:
          MEET_URL: ${{ github.event.inputs.meet_url }}
          RENDER_URL: ${{ github.event.inputs.render_url }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          # 1. Virtual Display & Audio
          pulseaudio -D --exit-idle-time=-1
          pactl load-module module-null-sink sink_name=Virtual_Sink || true
          pactl set-default-sink Virtual_Sink || true
          pactl set-default-source Virtual_Sink.monitor || true
          
          Xvfb :99 -screen 0 1366x768x24 &
          export DISPLAY=:99
          sleep 3
          
          # 2. VNC & noVNC (Increased compatibility and binding to all interfaces)
          VNC_PASS=$(openssl rand -hex 4)
          export VNC_PASS
          x11vnc -display :99 -forever -shared -bg -passwd "$VNC_PASS" -rfbport 5900 -listen 0.0.0.0 &
          sleep 2
          
          # Start websockify and ensure it bridges correctly
          websockify --web /usr/share/novnc 6080 0.0.0.0:5900 &
          sleep 2
          
          # 3. Public Tunnel
          python tunnel.py &
          
          # 4. Main Bot
          python meet_bot.py

      - name: 📤 Upload Recording
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cat << 'EOF' > upload.py
          import os
          import subprocess
          import requests

          bot_token = os.environ.get('BOT_TOKEN', '')
          chat_id = os.environ.get('CHAT_ID', '')
          video_file = 'output.mp4'

          if not os.path.exists(video_file):
              exit(0)

          size_mb = os.path.getsize(video_file) / (1024 * 1024)
          requests.post(f'https://api.telegram.org/bot{bot_token}/sendMessage', data={'chat_id': chat_id, 'text': f'📹 **Recording Complete!** ({size_mb:.1f} MB)\n📤 Uploading...'})

          if size_mb < 49:
              with open(video_file, 'rb') as f:
                  requests.post(f'https://api.telegram.org/bot{bot_token}/sendDocument', data={'chat_id': chat_id}, files={'document': f})
          else:
              subprocess.run(["ffmpeg", "-i", video_file, "-c", "copy", "-f", "segment", "-segment_time", "1200", "-reset_timestamps", "1", "chunk_%03d.mp4"])
              for chunk in sorted([f for f in os.listdir('.') if f.startswith('chunk_')]):
                  with open(chunk, 'rb') as f:
                      requests.post(f'https://api.telegram.org/bot{bot_token}/sendDocument', data={'chat_id': chat_id}, files={'document': f})
                  os.remove(chunk)
          EOF
          python upload.py

      - name: 🧹 Cleanup
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          curl -X DELETE -s -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/$REPO/actions/runs/$RUN_ID || true
